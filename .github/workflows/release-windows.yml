name: Build Windows Release

on:
  workflow_dispatch:
    inputs:
      version:
        description: 'Version number (e.g., 1.3.1)'
        required: true
        type: string
      release_tag:
        description: 'Release tag (e.g., v1.3.1)'
        required: true
        type: string
      update_latest:
        description: 'Update as latest version'
        required: true
        type: boolean
        default: true

permissions:
  contents: write

jobs:
  build-windows:
    runs-on: windows-latest
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          ref: main
      
      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
      
      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -e ".[desktop]"
          pip install pyinstaller
      
      - name: Build Windows executable
        run: |
          pyinstaller --noconfirm --clean packaging/openprivacy.spec
      
      - name: Create distribution archive
        run: |
          Compress-Archive -Path dist\OpenPrivacy -DestinationPath OpenPrivacy-windows.zip
      
      - name: Upload to release
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          gh release upload ${{ inputs.release_tag }} OpenPrivacy-windows.zip --clobber
      
      - name: Update versions.json
        if: ${{ inputs.update_latest }}
        run: |
          # Read current versions.json
          $versionsPath = "website/versions.json"
          $versions = Get-Content $versionsPath | ConvertFrom-Json
          
          # Update the latest version if needed
          if (${{ inputs.update_latest }}) {
            $versions.latest = "${{ inputs.version }}"
          }
          
          # Find and update the specific release
          $releaseUrl = "https://github.com/${{ github.repository }}/releases/download/${{ inputs.release_tag }}/OpenPrivacy-windows.zip"
          foreach ($release in $versions.releases) {
            if ($release.version -eq "${{ inputs.version }}") {
              $release.downloads.windows = $releaseUrl
              break
            }
          }
          
          # Save updated versions.json
          $versions | ConvertTo-Json -Depth 10 | Set-Content $versionsPath
      
      - name: Commit versions.json update
        if: ${{ inputs.update_latest }}
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add website/versions.json
          git diff --staged --quiet || git commit -m "Update versions.json with Windows download for v${{ inputs.version }}"
          git push origin HEAD:main
